<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App — Gradio Backend</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #333;
            text-align: center;
        }
        header h1 { font-size: 1.5rem; color: #fff; }
        header p { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
        main {
            max-width: 640px;
            width: 100%;
            padding: 2rem;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #4fc3f7;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.4rem;
        }
        textarea, input[type="text"] {
            width: 100%;
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 0.75rem;
            font-size: 0.95rem;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        button {
            margin-top: 0.75rem;
            padding: 0.6rem 1.5rem;
            background: #4fc3f7;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #81d4fa; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 1rem;
            padding: 1rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            min-height: 60px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
        }
        .status {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status.ok { background: #1b5e20; color: #a5d6a7; }
        .status.loading { background: #e65100; color: #ffcc80; }
        footer {
            margin-top: auto;
            padding: 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Custom App</h1>
        <p>Static HTML frontend powered by Gradio backend API</p>
    </header>

    <main>
        <!-- Status -->
        <div class="card">
            <h2>API Status</h2>
            <span id="api-status" class="status loading">Checking...</span>
        </div>

        <!-- Reverse Text -->
        <div class="card">
            <h2>Reverse Text</h2>
            <label for="input-text">Enter some text:</label>
            <textarea id="input-text" rows="3" placeholder="Type something..."></textarea>
            <button id="btn-reverse" onclick="callReverse()">Reverse It</button>
            <div class="result" id="result-reverse">Result will appear here...</div>
        </div>

        <!-- Echo (with file upload) -->
        <div class="card">
            <h2>Echo Message</h2>
            <label for="input-echo">Message:</label>
            <input type="text" id="input-echo" placeholder="Hello!">
            <button onclick="callEcho()">Send</button>
            <div class="result" id="result-echo">Waiting...</div>
        </div>
    </main>

    <footer>
        Powered by <strong>Gradio</strong> as backend &mdash; custom static HTML frontend
    </footer>

    <script>
        const API = '/gradio_api';

        // ── Health check ────────────────────────────────────────────
        async function checkApi() {
            const el = document.getElementById('api-status');
            try {
                const r = await fetch(`${API}/info`);
                el.textContent = 'Connected';
                el.className = 'status ok';
            } catch (e) {
                el.textContent = 'Disconnected';
                el.className = 'status loading';
            }
        }
        checkApi();

        // ── Helper: call a Gradio API endpoint ──────────────────────
        async function callGradio(apiName, data) {
            const r = await fetch(`${API}/call/${apiName}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data }),
            });
            const json = await r.json();
            const eventId = json.event_id;

            // Stream the result via SSE
            const evtSrc = new EventSource(
                `${API}/call/${apiName}/${eventId}`
            );
            return new Promise((resolve, reject) => {
                evtSrc.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.msg === 'process_completed') {
                        evtSrc.close();
                        resolve(msg.output.data);
                    }
                };
                evtSrc.onerror = (e) => {
                    evtSrc.close();
                    reject(new Error('SSE error'));
                };
            });
        }

        // ── Reverse text ────────────────────────────────────────────
        async function callReverse() {
            const btn = document.getElementById('btn-reverse');
            const result = document.getElementById('result-reverse');
            const text = document.getElementById('input-text').value;
            btn.disabled = true;
            result.textContent = 'Loading...';
            try {
                const output = await callGradio('reverse', [text]);
                result.textContent = output[0];
            } catch (e) {
                result.textContent = 'Error: ' + e.message;
            }
            btn.disabled = false;
        }

        // ── Echo ────────────────────────────────────────────────────
        async function callEcho() {
            const result = document.getElementById('result-echo');
            const msg = document.getElementById('input-echo').value;
            result.textContent = 'Loading...';
            try {
                const output = await callGradio('echo', [msg]);
                result.textContent = output[0];
            } catch (e) {
                result.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
